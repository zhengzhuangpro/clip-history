name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_dir: dmg
            bundles: dmg
            artifact_pattern: "*_aarch64.dmg"
            generic_name: Clip.History_aarch64.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle_dir: dmg
            bundles: dmg
            artifact_pattern: "*_x64.dmg"
            generic_name: Clip.History_x64.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_dir: nsis
            bundles: nsis
            artifact_pattern: "*_x64-setup.exe"
            generic_name: Clip.History_x64-setup.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload generic-named artifact
        shell: bash
        run: |
          src=$(find src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }} -name "${{ matrix.artifact_pattern }}" | head -1)
          cp "$src" "${{ matrix.generic_name }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.generic_name }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
